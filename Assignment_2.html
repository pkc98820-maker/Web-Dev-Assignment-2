<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #000000, #2b0000, #4a0000);
    min-height: 100vh;
    padding: 20px;
    color: #300dcb;
}

/* Container */
.container {
    max-width: 1200px;
    margin: auto;
}

/* Heading */
h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #ff4d4d;
    font-weight: 600;
    letter-spacing: 1px;
}

/* Layout */
.parent-card {
    display: flex;
    gap: 20px;
}

/* Glass Card Effect */
.card {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    width: 100%;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Input Group */
.input-group {
    display: flex;
    gap: 10px;
}

/* Input Field */
input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ff4d4d;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    outline: none;
    transition: 0.3s;
}

input::placeholder {
    color: #ccc;
}

input:focus {
    border-color: #3399ff;
    box-shadow: 0 0 8px #3399ff;
}

/* Search Button */
button {
    padding: 12px 18px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #0033cc, #3399ff);
    color: #fff;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* Button Hover */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px #3399ff;
}

/* Weather Items */
.weather-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-left: 4px solid #ff1a1a;
    margin-bottom: 10px;
    background: rgba(0, 0, 0, 0.5);
    border-radius: 6px;
    transition: 0.3s;
}

.weather-item:hover {
    background: rgba(255, 0, 0, 0.2);
}

/* Labels */
.weather-item label {
    color: #ff9999;
}

/* History Buttons */
.history button {
    margin: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(255, 0, 0, 0.3);
    border: none;
    color: #fff;
    transition: 0.3s;
}

.history button:hover {
    background: #ff1a1a;
    transform: scale(1.1);
}

/* Console (if used later) */
.console {
    background: #000;
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-family: monospace;
    max-height: 250px;
    overflow-y: auto;
}

/* Responsive */
@media (max-width: 700px) {
    .parent-card {
        flex-direction: column;
    }
}
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "69a7c88c467e99e04d6d0fe419d8f649";
        //    const API_KEY = "af9f63c59a649f27d602b96a43d0bd14";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");
        const cityInput = document.getElementById("cityInput");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
         
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- SAVE SEARCH HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            // avoid duplicate consecutive entries
            if (!history.includes(city)) {
                 history.unshift(city); // add at beginning
                }

    // limit history to 5 items
             history = history.slice(0, 5);

            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory(); 
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
           const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            historyBox.innerHTML = "";

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;

                btn.onclick = () => {
                     search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
